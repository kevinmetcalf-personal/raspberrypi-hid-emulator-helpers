# Raspberry Pi HID emulator automation configuration.
#
# Copy this file to config.ini, then edit config.ini for your emulator and Pi.
# config.ini is ignored by git so your local choices do not get published.

[hid]
# Linux USB HID gadget device. Most Raspberry Pi HID keyboard guides create
# /dev/hidg0. Change this only if your gadget setup uses a different device.
device = /dev/hidg0

# Writing to /dev/hidg0 usually requires root. Leave this on unless you have
# deliberately changed device permissions or udev rules.
require_root = yes

# Release all keys when you press Ctrl-C. This helps avoid leaving a virtual key
# held down after stopping a script.
install_exit_handler = yes

[emulator]
# Controller layout maps PlayStation button names to emulator keyboard keys.
# Known values:
#   retroarch_psx - RetroArch defaults used by these scripts
#   openemu_psx   - OpenEmu mapping from the older notes
controller_profile = retroarch_psx

# Timing profile contains measured delays for an emulator/input setup.
# Known values:
#   retroarch_psx
timing_profile = retroarch_psx

# Timing speed tunes the whole emulator timing profile:
#   - key hold time
#   - rapid repeat gaps
#   - menu movement waits
#   - select/confirm pauses
#   - medium waits
#   - long waits, such as menus opening
#
# Use 1 through 10:
#   1 = slowest/safest
#   5 = original measured timings
#   10 = fastest, but more likely to miss inputs if the emulator lags
timing_speed = 5

